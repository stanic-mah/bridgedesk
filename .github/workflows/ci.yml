name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    env:
      BRIDGEDESK_ALLOWED_ROOTS: ${{ github.workspace }}
      BRIDGEDESK_OAUTH_OWNER_TOKEN: ci-owner-token-that-is-long-enough
      BRIDGEDESK_PUBLIC_BASE_URL: http://127.0.0.1:7676

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Doctor
        run: node dist/cli.js doctor
